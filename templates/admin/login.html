{% extends 'base.html' %}

{% block title %}Login - IBSSR Portal{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-card" style="position: relative;">
        <!-- Neon Ambient Spot -->
        <div style="position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 140px; height: 140px; background: var(--primary); opacity: 0.15; filter: blur(40px); border-radius: 50%; pointer-events: none;"></div>

        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-user-shield" style="font-size: 3rem; background: linear-gradient(135deg, var(--primary), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; display: inline-block;"></i>
            <h2>Unified Login</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">
                Administrators and Authorized Franchises
            </p>
        </div>

        {% if error_message %}
            <div class="alert alert-error" style="margin-bottom: 1.5rem;">
                <i class="fa-solid fa-circle-exclamation"></i> {{ error_message }}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="id_username" name="username" class="form-control" placeholder="Enter username" style="padding-left: 2.75rem;" required autofocus>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="id_password">Password</label>
                <div style="position: relative;">
                    <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="id_password" name="password" class="form-control" placeholder="Enter password" style="padding-left: 2.75rem;" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Log In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
